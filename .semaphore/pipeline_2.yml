version: v1.0
name: Pipeline 2
agent:
  machine:
    type: e1-standard-2
    os_image: ubuntu2404
blocks:
  - name: Deploy
    task:
      jobs:
        - name: Deploy
          commands:
            # Noble images often have no awscli apt package; use official CLI v2 (x86_64).
            - sudo apt-get update -qq && sudo apt-get install -y unzip
            - curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
            - unzip -q /tmp/awscliv2.zip -d /tmp
            - sudo /tmp/aws/install --update
            - checkout
            - cd docs/website
            - sem-version node 20
            - 'cache restore docusaurus-node-modules-$SEMAPHORE_GIT_BRANCH-$(checksum yarn.lock),docusaurus-node-modules-$SEMAPHORE_GIT_BRANCH,docusaurus-node-modules-master'
            - bash ./bin/deploy.sh
      secrets:
        - name: aws_semaphore2
